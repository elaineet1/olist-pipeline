default_environment: dev
project_id: 019cf06f-dea3-78e4-afaa-6a7c9ba923de
environments:
- name: dev
- name: staging
- name: prod
plugins:
  extractors:
  - name: tap-csv
    variant: meltanolabs
    pip_url: git+https://github.com/MeltanoLabs/tap-csv.git
    config:
      files:
      - entity: olist_customers
        path: /home/dsai/olist-pipeline/data_raw/olist_customers_dataset.csv
        keys: [customer_id]
      - entity: olist_orders
        path: /home/dsai/olist-pipeline/data_raw/olist_orders_dataset.csv
        keys: [order_id]
      - entity: olist_order_items
        path: /home/dsai/olist-pipeline/data_raw/olist_order_items_dataset.csv
        keys: [order_id]
      - entity: olist_products
        path: /home/dsai/olist-pipeline/data_raw/olist_products_dataset.csv
        keys: [product_id]
      - entity: olist_sellers
        path: /home/dsai/olist-pipeline/data_raw/olist_sellers_dataset.csv
        keys: [seller_id]
      - entity: olist_payments
        path: /home/dsai/olist-pipeline/data_raw/olist_order_payments_dataset.csv
        keys: [order_id]
      - entity: olist_reviews
        path: /home/dsai/olist-pipeline/data_raw/olist_order_reviews_dataset.csv
        keys: [review_id]
      - entity: olist_geolocation
        path: /home/dsai/olist-pipeline/data_raw/olist_geolocation_dataset.csv
        keys: [geolocation_zip_code_prefix]
      
  loaders:
  - name: target-bigquery
    variant: z3z1ma
    pip_url: git+https://github.com/z3z1ma/target-bigquery.git setuptools<70
    config:
      batch_size: 104857600
      project: my-project-001-487905
      dataset: olist_raw
      credentials_path: /home/dsai/olist-pipeline/my-project-001-487905-7d2d910c3cd0.json
      denormalized: true
      flattening_enabled: true
      flattening_max_depth: 1
      method: batch_job
